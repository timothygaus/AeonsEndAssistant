name: CI

on:
    push:
        branches: [develop, main]
    pull_request:
        branches: [develop, main]

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            db:
                image: postgres:15
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: aeonsend_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: Install dependencies
              run: pip install -r backend/requirements.txt

            - name: Run migrations
              run: alembic upgrade head
              working-directory: backend
              env:
                DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aeonsend_test

            - name: Run tests
              run:  pytest tests/ -v
              working-directory: backend
              env:
                DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aeonsend_test